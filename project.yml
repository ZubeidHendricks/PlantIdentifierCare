# Generated by AppFactoryKit appgen. Run: xcodegen generate
name: PlantIdentifierCare
options:
  bundleIdPrefix: com.zubeid
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  AppFactoryKit:
    url: https://github.com/ZubeidHendricks/AppFactoryKit
    from: "0.1.0"

targets:
  PlantIdentifierCare:
    type: application
    platform: iOS
    sources:
      - Sources
      - Resources
    dependencies:
      - package: AppFactoryKit
        product: AppFactoryKit
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: "Plant ID"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSCameraUsageDescription: "PlantIdentifierCare uses the camera to capture and process your content."
        NSPhotoLibraryUsageDescription: "PlantIdentifierCare needs access to your photos to import and process images."
        NSPhotoLibraryAddUsageDescription: "PlantIdentifierCare saves your results to your photo library."
    settings:
      base:
        PRODUCT_NAME: PlantIdentifierCare
        PRODUCT_BUNDLE_IDENTIFIER: com.zubeid.plantid
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  PlantIdentifierCareTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
      - path: Sources/PlantIDService.swift
    settings:
      base:
        PRODUCT_NAME: PlantIdentifierCareTests
        PRODUCT_BUNDLE_IDENTIFIER: com.zubeid.plantidentifiercare.tests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"

schemes:
  Tests:
    build:
      targets:
        PlantIdentifierCareTests: [test]
    test:
      targets:
        - PlantIdentifierCareTests
